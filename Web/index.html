<body>

    <div class="sidebar">
        <div style="display: flex; align-items: center; margin-bottom: 30px;">
            <div style="width: 10px; height: 10px; background: var(--success-color); border-radius: 50%; margin-right: 10px;"></div>
            <h2 style="margin: 0; font-size: 20px; font-weight: 600;">L-CASH Home</h2>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="msg ai"><div class="msg-bubble">早上好！今天家里的空气非常清新，一切正常。</div></div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="告诉我你的需要..." onkeypress="handleEnter(event)">
            <button class="voice-btn" id="voiceBtn" title="按住说话">🎤</button>
            <button class="btn active" id="sendBtn" onclick="sendMessage()" style="padding: 8px 15px;">发送</button>
        </div>
    </div>

    <div class="main-panel">
        <div class="hero-section">
            <div class="bg-circle" id="pulseCircle"></div>
            <img src="https://img.icons8.com/plasticine/400/home.png" class="home-img" id="homeImg">
        </div>

        <div class="status-grid">
            <div class="card">
                <h3>CO₂ 浓度</h3>
                <div class="data-val" id="co2Val">400<span class="unit">ppm</span></div>
            </div>
            <div class="card">
                <h3>光照强度</h3>
                <div class="data-val" id="lightVal">520<span class="unit">lux</span></div>
            </div>
            <div class="card">
                <h3>室内温度</h3>
                <div class="data-val" id="tempVal">25.4<span class="unit">°C</span></div>
            </div>
            <div class="card">
                <h3>环境湿度</h3>
                <div class="data-val" id="humVal">48<span class="unit">%</span></div>
            </div>
        </div>

        <div class="card" id="securityCard" style="margin-top: 25px; width: 100%; max-width: 900px; display: flex; align-items: center; justify-content: space-between;">
            <div style="text-align: left;">
                <h3 style="margin-bottom: 5px;">安防状态</h3>
                <div id="secStatus" style="font-weight: 600; font-size: 18px; color: var(--accent-color);">🛡️ 守护中 - 安全</div>
            </div>
            <div id="secDetail" style="color: var(--text-sub); font-size: 14px;">区域内未检测到异常</div>
        </div>

        <div class="controls">
            <span style="line-height: 40px; color: var(--text-sub); margin-right: 10px;">智能设备控制:</span>
            <button id="fanBtn" class="btn" onclick="manualToggle('fan')">空气循环风扇</button>
            <button id="curtainBtn" class="btn" onclick="manualToggle('curtain')">智能窗帘</button>
        </div>
    </div>

    <script>
        // --- 1. 初始化 MQTT ---
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let deviceState = { fan: false, curtain: false };
        window.currentSensorsData = { temp: 25.4, hum: 48, co2: 400, light: 520 };

        mqttClient.on('connect', () => {
            mqttClient.subscribe('LCASH/sensors');
            mqttClient.subscribe('LCASH/security');
            console.log("MQTT 已连接!");
        });

        mqttClient.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            if (topic === 'LCASH/sensors') {
                if (data.node === 1) {
                    document.getElementById('co2Val').innerHTML = `${data.co2}<span class="unit">ppm</span>`;
                    document.getElementById('lightVal').innerHTML = `${data.light}<span class="unit">lux</span>`;
                    window.currentSensorsData.co2 = data.co2;
                    window.currentSensorsData.light = data.light;
                } else if (data.node === 2) {
                    document.getElementById('tempVal').innerHTML = `${data.temp}<span class="unit">°C</span>`;
                    document.getElementById('humVal').innerHTML = `${data.hum}<span class="unit">%</span>`;
                    window.currentSensorsData.temp = data.temp;
                    window.currentSensorsData.hum = data.hum;
                }
            }
            if (topic === 'LCASH/security') {
                handleSecurityTopic(data);
            }
        });

        // --- 2. 语音识别 (STT) 逻辑 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.interimResults = false;

            const voiceBtn = document.getElementById('voiceBtn');
            
            // 按住说话
            voiceBtn.onmousedown = () => {
                recognition.start();
                voiceBtn.classList.add('recording');
            };

            // 松开停止
            voiceBtn.onmouseup = () => {
                recognition.stop();
                voiceBtn.classList.remove('recording');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('userInput').value = transcript;
                sendMessage(); // 自动发送识别出的文字
            };

            recognition.onerror = (e) => {
                console.error("语音识别错误:", e);
                voiceBtn.classList.remove('recording');
            };
        }

        // --- 3. 语音合成 (TTS) 逻辑 ---
        function speak(text) {
            // 先停止之前的播放
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 1.1; // 稍微快一点点，听起来更自然
            window.speechSynthesis.speak(msg);
        }

        // --- 4. 业务核心：发送消息给 Flask ---
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const userText = input.value.trim();
            if (!userText) return;

            const sendBtn = document.getElementById('sendBtn');
            appendMsg('user', userText);
            input.value = '';
            sendBtn.innerText = "思考...";
            sendBtn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:5000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_text: userText, 
                        current_sensors: window.currentSensorsData 
                    })
                });
                const result = await response.json();
                
                // AI 回复并播放声音
                appendMsg('ai', result.ai_reply);
                speak(result.ai_reply);
                
                // 执行硬件指令
                if (result.executed_actions) {
                    result.executed_actions.forEach(act => {
                        mqttClient.publish('LCASH/commands', act);
                        if (act.includes("FAN:ON")) updateDeviceUI('fan', true);
                        if (act.includes("FAN:OFF")) updateDeviceUI('fan', false);
                        if (act.includes("CURTAIN:ON")) updateDeviceUI('curtain', true);
                        if (act.includes("CURTAIN:OFF")) updateDeviceUI('curtain', false);
                    });
                }
            } catch (error) { 
                appendMsg('ai', '中枢未启动，请检查后端状态。'); 
            } finally {
                sendBtn.innerText = "发送";
                sendBtn.disabled = false;
            }
        }

        // --- 5. UI 更新辅助函数 ---
        function appendMsg(role, text) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div'); 
            div.className = `msg ${role}`;
            div.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatBox.appendChild(div); 
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateDeviceUI(device, isOn) {
            deviceState[device] = isOn;
            const btn = document.getElementById(device + 'Btn');
            btn.className = isOn ? 'btn active' : 'btn';
        }

        function manualToggle(device) {
            const newState = !deviceState[device];
            updateDeviceUI(device, newState);
            const cmd = device === 'curtain' ? (newState ? "CURTAIN:ON" : "CURTAIN:OFF") : (newState ? "FAN:ON" : "FAN:OFF");
            mqttClient.publish('LCASH/commands', cmd);
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        // --- 6. 安防处理逻辑 (完整复刻) ---
        function handleSecurityTopic(data) {
            const secCard = document.getElementById('securityCard');
            const homeImg = document.getElementById('homeImg');
            const statusTxt = document.getElementById('secStatus');
            const pulseCircle = document.getElementById('pulseCircle');

            if (data.event === "unlock_success") {
                const welcomeMsg = '🌟 欢迎回家！识别已通过，系统已切换至居家模式。';
                appendMsg('ai', welcomeMsg);
                speak(welcomeMsg);
                statusTxt.innerText = "🏠 主人已回家";
                statusTxt.style.color = "#2ecc71";
                homeImg.style.filter = "drop-shadow(0 0 30px rgba(46, 204, 113, 0.4))";
                pulseCircle.style.background = "radial-gradient(circle, rgba(46, 204, 113, 0.2) 0%, transparent 70%)";
                setTimeout(() => {
                    statusTxt.innerText = "🛡️ 守护中 - 安全";
                    statusTxt.style.color = "var(--accent-color)";
                    homeImg.style.filter = "drop-shadow(0 20px 40px rgba(0,0,0,0.1))";
                    pulseCircle.style.background = "radial-gradient(circle, rgba(74, 144, 226, 0.1) 0%, transparent 70%)";
                }, 5000);
            } else if (data.event === "intrusion_alert") {
                secCard.classList.add('alert');
                statusTxt.innerText = "⚠️ 警告：有人靠近";
                statusTxt.style.color = "#e17055";
                homeImg.style.transform = "scale(1.1)";
                pulseCircle.style.background = "radial-gradient(circle, rgba(225, 112, 85, 0.2) 0%, transparent 70%)";
            } else {
                secCard.classList.remove('alert');
                statusTxt.innerText = "🛡️ 守护中 - 安全";
                statusTxt.style.color = "var(--accent-color)";
                homeImg.style.transform = "scale(1)";
            }
        }
    </script>
</body>
</html>

            <button id="curtainBtn" class="btn" onclick="manualToggle('curtain')">智能窗帘</button>
        </div>
    </div>

    <script>
        // --- 1. 初始化 MQTT ---
        const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let deviceState = { fan: false, curtain: false };
        window.currentSensorsData = { temp: 25.4, hum: 48, co2: 400, light: 520 };

        mqttClient.on('connect', () => {
            mqttClient.subscribe('LCASH/sensors');
            mqttClient.subscribe('LCASH/security');
            console.log("MQTT 已连接!");
        });

        mqttClient.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            if (topic === 'LCASH/sensors') {
                if (data.node === 1) {
                    document.getElementById('co2Val').innerHTML = `${data.co2}<span class="unit">ppm</span>`;
                    document.getElementById('lightVal').innerHTML = `${data.light}<span class="unit">lux</span>`;
                    window.currentSensorsData.co2 = data.co2;
                    window.currentSensorsData.light = data.light;
                } else if (data.node === 2) {
                    document.getElementById('tempVal').innerHTML = `${data.temp}<span class="unit">°C</span>`;
                    document.getElementById('humVal').innerHTML = `${data.hum}<span class="unit">%</span>`;
                    window.currentSensorsData.temp = data.temp;
                    window.currentSensorsData.hum = data.hum;
                }
            }
            if (topic === 'LCASH/security') {
                handleSecurityTopic(data);
            }
        });

        // --- 2. 语音识别 (STT) 逻辑 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.interimResults = false;

            const voiceBtn = document.getElementById('voiceBtn');
            
            // 按住说话
            voiceBtn.onmousedown = () => {
                recognition.start();
                voiceBtn.classList.add('recording');
            };

            // 松开停止
            voiceBtn.onmouseup = () => {
                recognition.stop();
                voiceBtn.classList.remove('recording');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('userInput').value = transcript;
                sendMessage(); // 自动发送识别出的文字
            };

            recognition.onerror = (e) => {
                console.error("语音识别错误:", e);
                voiceBtn.classList.remove('recording');
            };
        }

        // --- 3. 语音合成 (TTS) 逻辑 (已重构优美女声筛选) ---
        let availableVoices = [];
        
        // 预加载浏览器语音库 (不同浏览器加载时机不同)
        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function speak(text) {
            window.speechSynthesis.cancel(); // 停止之前的播放
            const msg = new SpeechSynthesisUtterance(text);
            
            if (availableVoices.length === 0) {
                availableVoices = window.speechSynthesis.getVoices();
            }

            // 过滤出中文声音
            const zhVoices = availableVoices.filter(voice => voice.lang.includes('zh'));
            
            if (zhVoices.length > 0) {
                // 优先级策略：寻找最高质量的自然女性声音（如 Edge 的 Xiaoxiao，Mac 的 Ting-Ting，或者带 Female 字样的）
                let preferredVoice = zhVoices.find(v => v.name.includes('Xiaoxiao') || v.name.includes('晓晓') || v.name.includes('Natural')) 
                                  || zhVoices.find(v => v.name.includes('Tingting') || v.name.includes('Ting-Ting'))
                                  || zhVoices.find(v => v.name.includes('Google') && !v.name.includes('Male'))
                                  || zhVoices[0]; // 兜底选项
                                  
                msg.voice = preferredVoice;
            }

            msg.lang = 'zh-CN';
            msg.rate = 1.0;  // 1.0 的语速通常比 1.1 更显自然、温柔
            msg.pitch = 1.05; // 稍微调高一点点音调，声音会显得更清脆女性化
            msg.volume = 1.0;
            
            window.speechSynthesis.speak(msg);
        }

        // --- 4. 业务核心：发送消息给 Flask ---
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const userText = input.value.trim();
            if (!userText) return;

            const sendBtn = document.getElementById('sendBtn');
            appendMsg('user', userText);
            input.value = '';
            sendBtn.innerText = "思考...";
            sendBtn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:5000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_text: userText, 
                        current_sensors: window.currentSensorsData 
                    })
                });
                const result = await response.json();
                
                // AI 回复并播放声音 (调用本地 API)
                appendMsg('ai', result.ai_reply);
                speak(result.ai_reply);
                
                // 执行硬件指令
                if (result.executed_actions) {
                    result.executed_actions.forEach(act => {
                        mqttClient.publish('LCASH/commands', act);
                        if (act.includes("FAN:ON")) updateDeviceUI('fan', true);
                        if (act.includes("FAN:OFF")) updateDeviceUI('fan', false);
                        if (act.includes("CURTAIN:ON")) updateDeviceUI('curtain', true);
                        if (act.includes("CURTAIN:OFF")) updateDeviceUI('curtain', false);
                    });
                }
            } catch (error) { 
                appendMsg('ai', '中枢未启动，请检查后端状态。'); 
            } finally {
                sendBtn.innerText = "发送";
                sendBtn.disabled = false;
            }
        }

        // --- 5. UI 更新辅助函数 ---
        function appendMsg(role, text) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div'); 
            div.className = `msg ${role}`;
            div.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatBox.appendChild(div); 
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateDeviceUI(device, isOn) {
            deviceState[device] = isOn;
            const btn = document.getElementById(device + 'Btn');
            btn.className = isOn ? 'btn active' : 'btn';
        }

        function manualToggle(device) {
            const newState = !deviceState[device];
            updateDeviceUI(device, newState);
            const cmd = device === 'curtain' ? (newState ? "CURTAIN:ON" : "CURTAIN:OFF") : (newState ? "FAN:ON" : "FAN:OFF");
            mqttClient.publish('LCASH/commands', cmd);
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        // --- 6. 安防处理逻辑 (完整复刻) ---
        function handleSecurityTopic(data) {
            const secCard = document.getElementById('securityCard');
            const homeImg = document.getElementById('homeImg');
            const statusTxt = document.getElementById('secStatus');
            const pulseCircle = document.getElementById('pulseCircle');

            if (data.event === "unlock_success") {
                const welcomeMsg = '🌟 欢迎回家！识别已通过，系统已切换至居家模式。';
                appendMsg('ai', welcomeMsg);
                speak(welcomeMsg);
                statusTxt.innerText = "🏠 主人已回家";
                statusTxt.style.color = "#2ecc71";
                homeImg.style.filter = "drop-shadow(0 0 30px rgba(46, 204, 113, 0.4))";
                pulseCircle.style.background = "radial-gradient(circle, rgba(46, 204, 113, 0.2) 0%, transparent 70%)";
                setTimeout(() => {
                    statusTxt.innerText = "🛡️ 守护中 - 安全";
                    statusTxt.style.color = "var(--accent-color)";
                    homeImg.style.filter = "drop-shadow(0 20px 40px rgba(0,0,0,0.1))";
                    pulseCircle.style.background = "radial-gradient(circle, rgba(74, 144, 226, 0.1) 0%, transparent 70%)";
                }, 5000);
            } else if (data.event === "intrusion_alert") {
                secCard.classList.add('alert');
                statusTxt.innerText = "⚠️ 警告：有人靠近";
                statusTxt.style.color = "#e17055";
                homeImg.style.transform = "scale(1.1)";
                pulseCircle.style.background = "radial-gradient(circle, rgba(225, 112, 85, 0.2) 0%, transparent 70%)";
            } else {
                secCard.classList.remove('alert');
                statusTxt.innerText = "🛡️ 守护中 - 安全";
                statusTxt.style.color = "var(--accent-color)";
                homeImg.style.transform = "scale(1)";
            }
        }
    </script>
